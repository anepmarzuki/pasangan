<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faktor Jozan — Profiling Pasangan</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #18181f;
    --border: rgba(255,255,255,0.08);
    --gold: #c9a84c;
    --gold2: #e8c97a;
    --gold-dim: rgba(201,168,76,0.15);
    --text: #e8e4dc;
    --text-dim: #8a8580;
    --besi: #a78bfa;
    --air: #60a5fa;
    --api: #f87171;
    --kayu: #4ade80;
    --tanah: #fb923c;
    --good: #4ade80;
    --warn: #fb923c;
    --bad: #f87171;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Crimson Pro', Georgia, serif;
    font-size: 18px;
    line-height: 1.7;
  }
  body::before {
    content:'';
    position:fixed; inset:0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 10%, rgba(201,168,76,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 80% 80%, rgba(96,165,250,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 60% 30%, rgba(248,113,113,0.03) 0%, transparent 50%);
    pointer-events:none; z-index:0;
  }
  main{position:relative;z-index:1;max-width:880px;margin:0 auto;padding:56px 20px 100px;}

  .eyebrow{
    font-family:'Cinzel',serif;
    font-size:11px;letter-spacing:0.25em;text-transform:uppercase;
    color:var(--gold);text-align:center;margin-bottom:14px;
  }
  h1{
    font-family:'Cinzel',serif;
    font-size:clamp(28px,5vw,46px);
    font-weight:700;text-align:center;
    line-height:1.15;margin-bottom:14px;
  }
  h1 span{
    background:linear-gradient(135deg,var(--gold) 0%, var(--gold2) 50%, var(--gold) 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  }
  .lead{
    text-align:center;color:var(--text-dim);font-style:italic;
    max-width:560px;margin:0 auto 44px;font-size:16px;
  }

  .twocol{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:28px;}
  @media (max-width:640px){.twocol{grid-template-columns:1fr;}}

  .person-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:18px;
    padding:28px;
    position:relative;
    overflow:hidden;
  }
  .person-card::before{
    content:'';position:absolute;top:0;left:0;right:0;height:2px;
  }
  .person-card.p1::before{background:linear-gradient(90deg,transparent,var(--air),transparent);}
  .person-card.p2::before{background:linear-gradient(90deg,transparent,var(--tanah),transparent);}

  .person-label{
    font-family:'Cinzel',serif;font-size:13px;letter-spacing:0.15em;text-transform:uppercase;
    margin-bottom:18px;display:flex;align-items:center;gap:8px;
  }
  .person-card.p1 .person-label{color:var(--air);}
  .person-card.p2 .person-label{color:var(--tanah);}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
  .person-card.p1 .dot{background:var(--air);}
  .person-card.p2 .dot{background:var(--tanah);}

  .field-row{display:flex;gap:10px;margin-bottom:12px;}
  .field{flex:1;display:flex;flex-direction:column;gap:6px;}
  .field label{
    font-family:'Cinzel',serif;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;
    color:var(--text-dim);
  }
  input[type=number], input[type=text]{
    background:var(--surface2);
    border:1px solid var(--border);
    border-radius:9px;
    padding:11px 13px;
    color:var(--text);
    font-family:'Crimson Pro',serif;
    font-size:16px;
    outline:none;
  }
  input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,0.1);}
  input::placeholder{color:var(--text-dim);font-style:italic;}

  .checkbox-row{
    display:flex;align-items:center;gap:10px;
    padding:10px 12px;margin-top:6px;
    background:var(--surface2);border:1px solid var(--border);border-radius:9px;
    cursor:pointer;font-size:13px;color:var(--text-dim);
  }
  .checkbox-row input{width:auto;flex-shrink:0;}

  .btn-kira{
    display:block;width:100%;
    background:linear-gradient(135deg,var(--gold) 0%, var(--gold2) 100%);
    color:#0a0a0f;
    font-family:'Cinzel',serif;font-size:15px;letter-spacing:0.12em;font-weight:700;
    padding:18px;border-radius:12px;border:none;cursor:pointer;
    box-shadow:0 0 30px rgba(201,168,76,0.25);
    margin-bottom:48px;
    transition:transform 0.15s, box-shadow 0.2s;
  }
  .btn-kira:hover{transform:translateY(-1px);box-shadow:0 8px 40px rgba(201,168,76,0.45);}

  .error-msg{
    display:none;color:var(--bad);font-size:14px;text-align:center;margin-bottom:20px;
    padding:12px;background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.25);border-radius:10px;
  }
  .error-msg.show{display:block;}

  #results{display:none;}
  #results.visible{display:block;}

  .section-divider{
    display:flex;align-items:center;gap:14px;margin:48px 0 24px;
  }
  .section-divider::before,.section-divider::after{
    content:'';flex:1;height:1px;background:linear-gradient(to right,transparent,var(--border),transparent);
  }
  .section-divider span{
    font-family:'Cinzel',serif;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);
  }

  .result-card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:18px;
    padding:32px;
    margin-bottom:24px;
    position:relative;
    overflow:hidden;
  }
  .result-card::before{
    content:'';position:absolute;top:0;left:0;right:0;height:2px;
  }
  .card-prisma::before{background:linear-gradient(90deg,transparent,var(--gold),transparent);}
  .card-keserasian::before{background:linear-gradient(90deg,transparent,var(--good),transparent);}
  .card-cabaran::before{background:linear-gradient(90deg,transparent,var(--bad),transparent);}
  .card-kekuatan::before{background:linear-gradient(90deg,transparent,var(--gold),transparent);}
  .card-haluan::before{background:linear-gradient(90deg,transparent,var(--kayu),transparent);}

  .prisma-visual-wrap{
    display:flex;justify-content:center;margin:8px 0 4px;
  }
  .node-val{
    font-family:'Cinzel',serif;
    font-size:14px;
    font-weight:700;
    fill:#e8e4dc;
  }
  .node-label{
    font-family:'Crimson Pro',serif;
    font-size:10px;
    fill:#8a8580;
  }

  .result-title{
    font-family:'Cinzel',serif;font-size:14px;letter-spacing:0.15em;text-transform:uppercase;
    color:var(--text-dim);margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;
    flex-wrap:wrap;gap:8px;
  }
  @media (max-width:480px){
    .result-card{padding:24px 20px;}
    .result-title{font-size:12px;}
  }

  .star-display{
    text-align:center;margin-bottom:16px;
  }
  .stars{font-size:34px;letter-spacing:6px;margin-bottom:8px;}
  .star-on{color:var(--gold2);}
  .star-off{color:rgba(255,255,255,0.12);}

  .badge-tahap{
    display:inline-block;
    font-family:'Cinzel',serif;font-size:13px;letter-spacing:0.1em;font-weight:700;
    padding:8px 22px;border-radius:100px;
  }
  .badge-1{background:rgba(248,113,113,0.15);color:var(--bad);border:1px solid rgba(248,113,113,0.4);}
  .badge-2{background:rgba(251,146,60,0.15);color:var(--warn);border:1px solid rgba(251,146,60,0.4);}
  .badge-mudah{background:rgba(74,222,128,0.15);color:var(--good);border:1px solid rgba(74,222,128,0.4);}

  .result-desc{
    text-align:center;color:var(--text);font-size:16px;margin-bottom:16px;
  }
  .result-meta{
    text-align:center;color:var(--text-dim);font-size:14px;font-style:italic;
  }

  .kekuatan-number{
    font-family:'Cinzel',serif;font-size:64px;font-weight:700;text-align:center;
    color:var(--gold2);line-height:1;margin-bottom:6px;
  }
  .kekuatan-label{
    text-align:center;font-size:13px;color:var(--text-dim);
    text-transform:uppercase;letter-spacing:0.15em;font-family:'Cinzel',serif;margin-bottom:18px;
  }
  .haluan-label-display{
    text-align:center;font-family:'Cinzel',serif;font-weight:700;
    font-size:clamp(26px,5vw,36px);color:var(--kayu);
    letter-spacing:0.04em;padding:10px 0 4px;
  }
  .kekuatan-desc{
    text-align:center;font-size:17px;color:var(--text);
    background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:18px 22px;
  }

  .detail-pill-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:14px;}
  .detail-pill{
    font-family:'Cinzel',serif;font-size:11px;letter-spacing:0.05em;
    background:var(--surface2);border:1px solid var(--border);
    padding:6px 14px;border-radius:100px;color:var(--text-dim);
  }

  .breakdown{
    margin-top:20px;padding-top:18px;border-top:1px solid var(--border);
    font-size:14px;color:var(--text-dim);
  }
  .breakdown summary{cursor:pointer;color:var(--gold);font-family:'Cinzel',serif;font-size:12px;letter-spacing:0.08em;text-transform:uppercase;}
  .breakdown-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:14px;}
  @media(max-width:560px){.breakdown-grid{grid-template-columns:repeat(3,1fr);}}
  .node-chip{
    background:var(--surface2);border:1px solid var(--border);border-radius:8px;
    padding:8px 4px;text-align:center;font-size:13px;
  }
  .node-chip .nlabel{font-size:10px;color:var(--text-dim);display:block;}
  .node-chip .nval{font-family:'Cinzel',serif;font-weight:700;font-size:16px;}

  footer{
    margin-top:60px;padding-top:20px;border-top:1px solid var(--border);
    text-align:center;font-size:13px;color:var(--text-dim);
  }
  .note-box{
    background:var(--surface2);border:1px dashed var(--border);border-radius:12px;
    padding:16px 20px;font-size:13.5px;color:var(--text-dim);margin-top:30px;
  }
</style>
</head>
<body>
<main>
  <h1>Profiling <span>Pasangan</span></h1>

  <div class="twocol">
    <div class="person-card p1">
      <div class="person-label"><span class="dot"></span>Si 1</div>
      <div class="field-row">
        <div class="field">
          <label>Hari</label>
          <input type="number" id="p1-hari" placeholder="15" min="1" max="31">
        </div>
        <div class="field">
          <label>Bulan</label>
          <input type="number" id="p1-bulan" placeholder="5" min="1" max="12">
        </div>
        <div class="field">
          <label>Tahun</label>
          <input type="number" id="p1-tahun" placeholder="1990" min="1900" max="2025">
        </div>
      </div>
      <label class="checkbox-row">
        <input type="checkbox" id="p1-subuh">
        Lahir 12 malam – sebelum Subuh?
      </label>
    </div>

    <div class="person-card p2">
      <div class="person-label"><span class="dot"></span>Si 2</div>
      <div class="field-row">
        <div class="field">
          <label>Hari</label>
          <input type="number" id="p2-hari" placeholder="15" min="1" max="31">
        </div>
        <div class="field">
          <label>Bulan</label>
          <input type="number" id="p2-bulan" placeholder="5" min="1" max="12">
        </div>
        <div class="field">
          <label>Tahun</label>
          <input type="number" id="p2-tahun" placeholder="1990" min="1900" max="2025">
        </div>
      </div>
      <label class="checkbox-row">
        <input type="checkbox" id="p2-subuh">
        Lahir 12 malam – sebelum Subuh?
      </label>
    </div>
  </div>

  <div class="error-msg" id="error-msg">Sila isi tarikh lahir kedua-dua individu dengan betul.</div>

  <button class="btn-kira" onclick="kiraJozan()">✦ Kira Energy Bersama</button>

  <div id="results">

    <div class="section-divider"><span>Keputusan</span></div>

    <!-- KEKUATAN BERSAMA -->
    <div class="result-card card-kekuatan">
      <div class="result-title">Karakter Gabungan</div>
      <div class="kekuatan-number" id="kekuatan-number"></div>
    </div>

    <!-- KESERASIAN -->
    <div class="result-card card-keserasian">
      <div class="result-title">Keharmonian</div>
      <div class="star-display">
        <div class="stars" id="star-display"></div>
        <div class="badge-tahap" id="keharmonian-badge" style="background:rgba(74,222,128,0.15);color:var(--good);border:1px solid rgba(74,222,128,0.4);"></div>
      </div>
    </div>

    <!-- CABARAN -->
    <div class="result-card card-cabaran">
      <div class="result-title">Perhatian Bersama</div>
      <div class="star-display">
        <span class="badge-tahap" id="cabaran-badge"></span>
      </div>
    </div>

  </div>
</main>

<script>
const ELEMENT_NAME = {
  1:'BESI',6:'BESI',
  2:'AIR',7:'AIR',
  3:'API',8:'API',
  4:'KAYU',9:'KAYU',
  5:'TANAH'
};

const NODE_ORDER = ['A','B','C','D','E','F','G','H','I','oi','oii','oiii','oiv','ov','ovi'];
const INNER_NODES = ['A','B','C','D','E','F','G','H','I'];

// Adjacency ditentukan berdasarkan kedudukan FIZIKAL (x,y) nod dalam rajah piramid asal
// (metalife-prisma.html), bukan hubungan formula. Dua nod dianggap "bersebelahan" jika
// jaraknya cukup dekat secara vertical, horizontal, atau diagonal dalam susunan grid rajah.
// NOTA: Sambungan antara zon INNER dan zon OUTER dihadkan HANYA kepada 4 pasangan ini:
// G↔ov, G↔ovi, G↔oi, G↔oiii — pasangan inner-outer lain (cth E↔oi, F↔oiii) tidak dikira
// bersebelahan. Sambungan inner-dengan-inner (A,B,C,D,E,F,G,H,I) dan outer-dengan-outer
// (oi↔oii, oiii↔oiv, ov↔ovi) kekal seperti biasa.
const ADJACENCY = {
  A:['B','E'],
  B:['A','H','E','I'],
  C:['D','H','F','I'],
  D:['C','F'],
  E:['A','B','I','G'],
  F:['D','C','I','G'],
  G:['I','E','F','ov','ovi','oi','oiii'],
  H:['B','C','I'],
  I:['H','G','E','F','B','C'],
  oi:['oii','G'],
  oii:['oi'],
  oiii:['oiv','G'],
  oiv:['oiii'],
  ov:['ovi','G'],
  ovi:['ov','G'],
};

const KEKUATAN_TABLE = {
  1:"Kekuatan pada nilai Pemimpin",
  2:"Kekuatan pada nilai interaksi / komunikasi, boleh mempengaruhi",
  3:"Kekuatan pada nilai bertindak — agresif & pengaruh spiritual/kerohanian",
  4:"Kekuatan pada nilai ilmu dan perancangan",
  5:"Kekuatan pada nilai prinsip dan kepimpinan — namun ada cabarannya, perlu sabar",
  6:"Kekuatan pada nilai mudah-rezeki / cash",
  7:"Kekuatan pada nilai bersosial / berkawan, menarik penyokong, marketer",
  8:"Kekuatan pada nilai tanggungjawab dan sibuk, namun boleh tinggi cabaran — kena banyak sabar",
  9:"Kekuatan pada sifat harmoni dengan persekitaran dan orang ramai",
};

function toDigit(n){
  n = Math.abs(parseInt(n));
  while(n > 9){
    let s = 0;
    while(n > 0){ s += n % 10; n = Math.floor(n/10); }
    n = s;
  }
  return n;
}

function getABCD(hari, bulan, tahun, subuh){
  if(subuh) hari = hari - 1;
  if(hari < 1) hari = 1;
  const kurun = Math.floor(tahun / 100);
  const tahun2 = tahun % 100;
  const A = toDigit(hari);
  const B = toDigit(bulan);
  const C = toDigit(kurun);
  const D = toDigit(tahun2 === 0 ? 9 : tahun2);
  return {A,B,C,D};
}

function kiraPrismaFromABCD(A,B,C,D){
  const E = toDigit(A+B);
  const F = toDigit(C+D);
  const G = toDigit(E+F);
  const H = toDigit(B+C);
  const I = toDigit(G+H);
  const oi = toDigit(A+E);
  const oii = toDigit(B+E);
  const oiii = toDigit(C+F);
  const oiv = toDigit(D+F);
  const ov = toDigit(F+G);
  const ovi = toDigit(E+G);
  return {A,B,C,D,E,F,G,H,I,oi,oii,oiii,oiv,ov,ovi};
}

function kiraPrismaData(hari, bulan, tahun, subuh){
  const {A,B,C,D} = getABCD(hari, bulan, tahun, subuh);
  return kiraPrismaFromABCD(A,B,C,D);
}

function gabungkanPrisma(p1, p2){
  const A_g = toDigit(p1.A + p2.A);
  const B_g = toDigit(p1.B + p2.B);
  const C_g = toDigit(p1.C + p2.C);
  const D_g = toDigit(p1.D + p2.D);
  return kiraPrismaFromABCD(A_g, B_g, C_g, D_g);
}

function findAdjacentPairs(p, valA, valB){
  const found = [];
  for(const node of NODE_ORDER){
    const nv = p[node];
    const neighbors = ADJACENCY[node];
    for(const nb of neighbors){
      const nbv = p[nb];
      if((nv===valA && nbv===valB) || (nv===valB && nbv===valA)){
        const key = [node,nb].sort().join('-');
        if(!found.some(f=>f.key===key)){
          found.push({key, node, nb, nv, nbv});
        }
      }
    }
  }
  return found;
}

function countOccurrences(p, values){
  let count = 0;
  for(const n of INNER_NODES){
    if(values.includes(p[n])) count++;
  }
  return count;
}

function jozanKeserasian(pg){
  const adj = findAdjacentPairs(pg, 2, 7);
  const countAir = countOccurrences(pg, [2,7]);

  if(adj.length > 0){
    return {
      bintang: 5,
      label: 'Keharmonian Tinggi',
      desc: 'Keharmonian tertinggi — nombor 2 & 7 bersebelahan dalam prisma gabungan',
      meta: `Ditemui pada: ${adj.map(a=>`${a.node}=${a.nv} ↔ ${a.nb}=${a.nbv}`).join(', ')}`,
      pills: [`Jumlah elemen Air: ${countAir}`]
    };
  } else if(countAir >= 3){
    return {
      bintang: 3,
      label: 'Keharmonian Sederhana',
      desc: 'Keharmonian sederhana — elemen Air (2/7) hadir kuat dalam prisma gabungan',
      meta: `Elemen Air (nombor 2 atau 7) muncul ${countAir} kali dalam prisma gabungan`,
      pills: [`Jumlah elemen Air: ${countAir}`]
    };
  } else {
    return {
      bintang: 2,
      label: 'Keharmonian Perlu Diperkasa',
      desc: 'Keharmonian asas — elemen Air kurang hadir, perlu usaha lebih untuk membina kasih sayang & komunikasi',
      meta: `Elemen Air (nombor 2 atau 7) hanya muncul ${countAir} kali`,
      pills: [`Jumlah elemen Air: ${countAir}`]
    };
  }
}

function jozanCabaran(pg){
  const adj88 = findAdjacentPairs(pg, 8, 8);

  // Jumlah dikira HANYA pada elemen Api (nombor 3 & 8), bukan Tanah/Kayu
  const countApi = countOccurrences(pg, [3,8]);
  const apiTinggi = countApi >= 3;

  if(apiTinggi || adj88.length > 0){
    let sebab = [];
    if(apiTinggi) sebab.push(`elemen Api hadir kuat (${countApi} kali, ≥3x)`);
    if(adj88.length > 0) sebab.push(`8&8 bersebelahan pada ${adj88.map(a=>`${a.node}=${a.nv}↔${a.nb}=${a.nbv}`).join(', ')}`);
    return {
      tahap: 1,
      badge: 'badge-1',
      label: 'Tahap 1 — Perhatian Utama',
      desc: 'Cabaran paling mencabar — perlu kesabaran dan kawalan emosi yang tinggi dalam hubungan ini',
      meta: sebab.join(' · '),
      pills: [`Jumlah Api: ${countApi}`, ...(adj88.length>0 ? ['8&8 bersebelahan'] : [])]
    };
  } else {
    return {
      tahap: 2,
      badge: 'badge-2',
      label: 'Tahap 2 — Perhatian Ringan',
      desc: 'Cabaran sederhana — hubungan ini secara relatifnya lebih mudah diuruskan',
      meta: `Elemen Api (nombor 3 atau 8) muncul ${countApi} kali, dan tiada 8&8 bersebelahan`,
      pills: [`Jumlah Api: ${countApi}`]
    };
  }
}

function jozanKekuatan(pg){
  const a = pg.G;
  return {
    a,
    desc: KEKUATAN_TABLE[a],
    meta: `Kod 'a' = G (apex segitiga dalam) prisma gabungan = ${a}`
  };
}

const HALUAN_TABLE = {
  3: 'Disiplin',
  6: 'Rezeki',
  9: 'Kemanusiaan',
};

function jozanHaluan(pg){
  const hasil_i_ii = toDigit(pg.oi + pg.oii);
  const hasil_iii_iv = toDigit(pg.oiii + pg.oiv);
  const hasil_v_vi = toDigit(pg.ov + pg.ovi);
  const hasils = [hasil_i_ii, hasil_iii_iv, hasil_v_vi];

  // Cari nombor yang berulang (muncul >=2 kali) antara ketiga-tiga hasil
  const freq = {};
  hasils.forEach(v => freq[v] = (freq[v]||0) + 1);

  let berulang = null;
  for(const v of hasils){
    if(freq[v] >= 2){
      berulang = v;
      break;
    }
  }

  if(berulang !== null && HALUAN_TABLE[berulang]){
    return { ditemui: true, nombor: berulang, label: HALUAN_TABLE[berulang] };
  } else if(berulang !== null){
    // berulang tapi bukan 3/6/9 -- tetap dikira holistik sebab tiada makna khusus
    return { ditemui: true, nombor: null, label: 'Haluan Holistik' };
  } else {
    return { ditemui: true, nombor: null, label: 'Haluan Holistik' };
  }
}

function buildNodeGrid(p){
  const elColor = {BESI:'var(--besi)',AIR:'var(--air)',API:'var(--api)',KAYU:'var(--kayu)',TANAH:'var(--tanah)'};
  return NODE_ORDER.map(n=>{
    const v = p[n];
    const el = ELEMENT_NAME[v];
    return `<div class="node-chip">
      <span class="nlabel">${n}</span>
      <span class="nval" style="color:${elColor[el]}">${v}</span>
    </div>`;
  }).join('');
}

function updatePrismGabungSVG(pg){
  const elColor = {1:'#a78bfa',6:'#a78bfa',2:'#60a5fa',7:'#60a5fa',3:'#f87171',8:'#f87171',4:'#4ade80',9:'#4ade80',5:'#fb923c'};
  const idMap = {A:'g-A',B:'g-B',C:'g-C',D:'g-D',E:'g-E',F:'g-F',G:'g-G',H:'g-H',I:'g-I',
                 oi:'g-oi',oii:'g-oii',oiii:'g-oiii',oiv:'g-oiv',ov:'g-ov',ovi:'g-ovi'};
  Object.entries(idMap).forEach(([key, id])=>{
    const el = document.getElementById(id);
    if(!el) return;
    const v = pg[key];
    el.textContent = v;
    el.style.fill = elColor[v] || '#c9a84c';
  });
}

function kiraJozan(){
  const errEl = document.getElementById('error-msg');
  errEl.classList.remove('show');

  const p1hari = parseInt(document.getElementById('p1-hari').value);
  const p1bulan = parseInt(document.getElementById('p1-bulan').value);
  const p1tahun = parseInt(document.getElementById('p1-tahun').value);
  const p1subuh = document.getElementById('p1-subuh').checked;

  const p2hari = parseInt(document.getElementById('p2-hari').value);
  const p2bulan = parseInt(document.getElementById('p2-bulan').value);
  const p2tahun = parseInt(document.getElementById('p2-tahun').value);
  const p2subuh = document.getElementById('p2-subuh').checked;

  function valid(h,b,y){
    return h && b && y && h>=1 && h<=31 && b>=1 && b<=12 && y>=1900;
  }

  if(!valid(p1hari,p1bulan,p1tahun) || !valid(p2hari,p2bulan,p2tahun)){
    errEl.classList.add('show');
    return;
  }

  const p1 = kiraPrismaData(p1hari, p1bulan, p1tahun, p1subuh);
  const p2 = kiraPrismaData(p2hari, p2bulan, p2tahun, p2subuh);
  const pg = gabungkanPrisma(p1, p2);

  // KESERASIAN (dari prisma gabungan)
  const keserasian = jozanKeserasian(pg);
  const starsHtml = Array.from({length:5}, (_,i)=> i < keserasian.bintang ? '<span class="star-on">★</span>' : '<span class="star-off">★</span>').join('');
  document.getElementById('star-display').innerHTML = starsHtml;
  const khBadge = document.getElementById('keharmonian-badge');
  khBadge.textContent = keserasian.label;
  if(keserasian.bintang >= 5){
    khBadge.style.background = 'rgba(74,222,128,0.15)'; khBadge.style.color = 'var(--good)'; khBadge.style.borderColor = 'rgba(74,222,128,0.4)';
  } else if(keserasian.bintang >= 3){
    khBadge.style.background = 'rgba(251,146,60,0.15)'; khBadge.style.color = 'var(--warn)'; khBadge.style.borderColor = 'rgba(251,146,60,0.4)';
  } else {
    khBadge.style.background = 'rgba(248,113,113,0.15)'; khBadge.style.color = 'var(--bad)'; khBadge.style.borderColor = 'rgba(248,113,113,0.4)';
  }

  // CABARAN (dari prisma gabungan)
  const cabaran = jozanCabaran(pg);
  document.getElementById('cabaran-badge').className = 'badge-tahap ' + cabaran.badge;
  document.getElementById('cabaran-badge').textContent = cabaran.label;

  // KEKUATAN (dari prisma gabungan)
  const kekuatan = jozanKekuatan(pg);
  document.getElementById('kekuatan-number').textContent = kekuatan.a;

  const resultsEl = document.getElementById('results');
  resultsEl.classList.add('visible');
  resultsEl.scrollIntoView({behavior:'smooth', block:'start'});
}
